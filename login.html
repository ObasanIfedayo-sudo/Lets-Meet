<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Let's Meet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Let's Meet</h2>
        <div class="nav-buttons">
            <button onclick="goToSignup()">Sign Up</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Welcome Back</h1>

        <input id="loginEmail" type="text" placeholder="Email or Phone">
        <input id="loginPassword" type="password" placeholder="Password">

        <button class="main-btn" onclick="login()">Login</button>

        <p id="loginMessage" class="message"></p>

        <p class="switch-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
